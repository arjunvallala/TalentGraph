name: TalentGraph AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Python Backend Tests ────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run linting (Ruff)
        run: ruff check . --select E,W,F,I

      - name: Run type checking (mypy)
        run: mypy shared/ services/ apps/api/ --ignore-missing-imports
        continue-on-error: true  # Don't fail CI on type errors during dev

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          APP_ENV: test
          DEMO_MODE: "true"
          DUCKDB_PATH: ":memory:"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Python Code Quality ──────────────────────────────────────────────────────
  lint-backend:
    name: Backend Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff black
      - name: Check formatting (Black)
        run: black --check --diff .
        continue-on-error: true
      - name: Lint (Ruff)
        run: ruff check .

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/dashboard

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/dashboard

      - name: Build
        run: npm run build
        working-directory: apps/dashboard
        env:
          VITE_API_BASE_URL: http://localhost:8000

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v -k "not slow"
        env:
          APP_ENV: test
          DEMO_MODE: "true"
        continue-on-error: true
